services:
  postgres:
    image: postgres:16-alpine
    container_name: jobfocus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobfocus}
      POSTGRES_USER: ${POSTGRES_USER:-jobfocus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobfocus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobfocus} -d ${POSTGRES_DB:-jobfocus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: jobfocus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
